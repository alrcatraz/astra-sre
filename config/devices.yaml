# astra-sre device inventory
# Copy this file, rename to devices.yaml, and fill in your actual infrastructure.
# This file is in .gitignore to prevent accidental commits of real credentials.

devices:
  - name: server-1
    role: Primary server
    desc: Web server, database, reverse proxy
    os: Debian 12
    ssh: user@your-server-1-ip
    ssh_port: 22
    key: id_ed25519
    checks:
      - systemd: [sshd, nginx, postgresql]
      - port: [22, 80, 443, 5432]
      - disk_warn: 85
      - disk_crit: 92

  - name: server-2
    role: Backup / secondary
    desc: Backup target, monitoring
    os: Ubuntu 24.04
    ssh: user@your-server-2-ip
    ssh_port: 22
    key: id_ed25519
    checks:
      - systemd: [sshd]
      - disk_warn: 85
      - disk_crit: 92

  - name: nas-1
    role: NAS / storage
    desc: Network attached storage
    os: DSM 7.x
    ssh: user@nas-ip
    key: id_ed25519
    checks:
      - systemd: [sshd]
      - disk_warn: 85
      - disk_crit: 92
      - docker: true

  - name: workstation-1
    role: Local workstation
    desc: Daily driver
    os: Linux (any distro)
    ssh: localhost
    key: ""
    checks:
      - systemd: [sshd, NetworkManager]
      - disk_warn: 85
      - disk_crit: 92
      - port: []

  - name: router-1
    role: Router / gateway
    desc: OpenWrt-based router
    os: OpenWrt 23.05+
    ssh: root@router-ip
    ssh_port: 22
    key: id_ed25519
    checks:
      - port: [22, 80, 443, 53]
      - disk_warn: 85
      - disk_crit: 92
